name: Ingest Unstructured Data

on:
  schedule:
    # Once a day — these are slow-changing HTML mission pages, no need for 6h cadence.
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  fetch-unify-vectorize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run unstructured ingestion (fetch -> unify -> vectorize)
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: poetry run python -m scripts.run_ingestion_pipeline --stage unstructured

      - name: Freshness report
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: poetry run python -m scripts.check_freshness
        continue-on-error: true
